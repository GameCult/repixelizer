<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Repixelizer monogram logo concept</title>
  <desc id="desc">A chunky pixel-art R monogram with a right-shifted phase ghost on a dark square badge.</desc>
  <defs>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#ffd84a" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <style>
      svg { shape-rendering: crispEdges; }
      .badge { fill: #0a1b2f; stroke: #ffd84a; stroke-width: 6; }
      .rim { fill: none; stroke: #1d4d75; stroke-width: 6; }
      .grid { fill: url(#grid); opacity: 0.32; }
      .ghost { fill: #8fe2c8; opacity: 0.2; }
      .glyph { fill: #fff4bf; }
    </style>
  </defs>

  <rect class="badge" x="20" y="20" width="216" height="216" rx="26" />
  <rect class="rim" x="34" y="34" width="188" height="188" rx="18" />
  <rect class="grid" x="34" y="34" width="188" height="188" rx="18" />

  <g transform="translate(64 58)">
    <g transform="translate(12 0)">
      <rect class="ghost" x="0" y="0" width="120" height="10" />
      <rect class="ghost" x="0" y="10" width="120" height="10" />
      <rect class="ghost" x="0" y="20" width="40" height="10" />
      <rect class="ghost" x="100" y="20" width="40" height="10" />
      <rect class="ghost" x="0" y="30" width="40" height="10" />
      <rect class="ghost" x="100" y="30" width="40" height="10" />
      <rect class="ghost" x="0" y="40" width="40" height="10" />
      <rect class="ghost" x="100" y="40" width="40" height="10" />
      <rect class="ghost" x="0" y="50" width="40" height="10" />
      <rect class="ghost" x="100" y="50" width="40" height="10" />
      <rect class="ghost" x="0" y="60" width="40" height="10" />
      <rect class="ghost" x="80" y="60" width="60" height="10" />
      <rect class="ghost" x="0" y="70" width="40" height="10" />
      <rect class="ghost" x="80" y="70" width="60" height="10" />
      <rect class="ghost" x="0" y="80" width="100" height="10" />
      <rect class="ghost" x="0" y="90" width="100" height="10" />
      <rect class="ghost" x="0" y="100" width="40" height="10" />
      <rect class="ghost" x="60" y="100" width="60" height="10" />
      <rect class="ghost" x="0" y="110" width="40" height="10" />
      <rect class="ghost" x="60" y="110" width="60" height="10" />
      <rect class="ghost" x="0" y="120" width="40" height="10" />
      <rect class="ghost" x="80" y="120" width="60" height="10" />
      <rect class="ghost" x="0" y="130" width="40" height="10" />
      <rect class="ghost" x="80" y="130" width="60" height="10" />
    </g>

    <rect class="glyph" x="0" y="0" width="120" height="10" />
    <rect class="glyph" x="0" y="10" width="120" height="10" />
    <rect class="glyph" x="0" y="20" width="40" height="10" />
    <rect class="glyph" x="100" y="20" width="40" height="10" />
    <rect class="glyph" x="0" y="30" width="40" height="10" />
    <rect class="glyph" x="100" y="30" width="40" height="10" />
    <rect class="glyph" x="0" y="40" width="40" height="10" />
    <rect class="glyph" x="100" y="40" width="40" height="10" />
    <rect class="glyph" x="0" y="50" width="40" height="10" />
    <rect class="glyph" x="100" y="50" width="40" height="10" />
    <rect class="glyph" x="0" y="60" width="40" height="10" />
    <rect class="glyph" x="80" y="60" width="60" height="10" />
    <rect class="glyph" x="0" y="70" width="40" height="10" />
    <rect class="glyph" x="80" y="70" width="60" height="10" />
    <rect class="glyph" x="0" y="80" width="100" height="10" />
    <rect class="glyph" x="0" y="90" width="100" height="10" />
    <rect class="glyph" x="0" y="100" width="40" height="10" />
    <rect class="glyph" x="60" y="100" width="60" height="10" />
    <rect class="glyph" x="0" y="110" width="40" height="10" />
    <rect class="glyph" x="60" y="110" width="60" height="10" />
    <rect class="glyph" x="0" y="120" width="40" height="10" />
    <rect class="glyph" x="80" y="120" width="60" height="10" />
    <rect class="glyph" x="0" y="130" width="40" height="10" />
    <rect class="glyph" x="80" y="130" width="60" height="10" />
  </g>
</svg>
