<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Repixelizer monogram logo concept</title>
  <desc id="desc">A discrete pixel-tile R monogram built from the reference mosaic, inset cleanly inside the rounded badge and trailed by a right-shifted phase ghost.</desc>
  <defs>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#ffd84a" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <symbol id="tile-ghost" overflow="visible">
      <rect class="tile-fill ghost-fill" x="0" y="0" width="9" height="9" rx="3.2" ry="3.2" />
      <rect class="tile-stroke ghost-stroke" x="1.25" y="1.25" width="6.5" height="6.5" rx="2.2" ry="2.2" />
    </symbol>
    <symbol id="tile-main" overflow="visible">
      <rect class="tile-fill tile-main-fill" x="0" y="0" width="9" height="9" rx="3.2" ry="3.2" />
      <rect class="tile-stroke tile-main-stroke" x="1.25" y="1.25" width="6.5" height="6.5" rx="2.2" ry="2.2" />
    </symbol>
    <symbol id="tile-bright" overflow="visible">
      <rect class="tile-fill tile-bright-fill" x="0" y="0" width="9" height="9" rx="3.2" ry="3.2" />
      <rect class="tile-stroke tile-bright-stroke" x="1.25" y="1.25" width="6.5" height="6.5" rx="2.2" ry="2.2" />
    </symbol>
    <symbol id="tile-dark" overflow="visible">
      <rect class="tile-fill tile-dark-fill" x="0" y="0" width="9" height="9" rx="3.2" ry="3.2" />
      <rect class="tile-stroke tile-dark-stroke" x="1.25" y="1.25" width="6.5" height="6.5" rx="2.2" ry="2.2" />
    </symbol>
    <style>
      svg { shape-rendering: crispEdges; }
      .badge { fill: #0a1b2f; stroke: #ffd84a; stroke-width: 6; }
      .rim { fill: none; stroke: #1d4d75; stroke-width: 6; }
      .grid { fill: url(#grid); opacity: 0.32; }
      .tile-fill { stroke: none; }
      .tile-stroke { fill: none; stroke-width: 2; }
      .ghost-fill { fill: #8fe2c8; fill-opacity: 0.18; }
      .ghost-stroke { stroke: #eafff7; stroke-opacity: 0.18; }
      .tile-main-fill { fill: #ffe48a; }
      .tile-main-stroke { stroke: #fff4cf; stroke-opacity: 0.46; }
      .tile-bright-fill { fill: #fff7cf; }
      .tile-bright-stroke { stroke: #fffef6; stroke-opacity: 0.58; }
      .tile-dark-fill { fill: #d79a31; }
      .tile-dark-stroke { stroke: #f4c875; stroke-opacity: 0.44; }
    </style>
  </defs>

  <rect class="badge" x="20" y="20" width="216" height="216" rx="26" />
  <rect class="rim" x="34" y="34" width="188" height="188" rx="18" />
  <rect class="grid" x="34" y="34" width="188" height="188" rx="18" />

