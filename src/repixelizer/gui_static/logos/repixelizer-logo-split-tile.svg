<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Repixelizer split tile logo concept</title>
  <desc id="desc">A badge split between chaotic fake pixels and a clean snapped lattice.</desc>
  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .badge { fill: #0a1b2f; stroke: #ffd84a; stroke-width: 6; }
      .rim { fill: none; stroke: #1d4d75; stroke-width: 6; }
      .noise { fill: #8fe2c8; opacity: 0.22; }
      .dark { fill: #153450; }
      .gold { fill: #ffe48a; }
      .orange { fill: #ffb72a; }
      .core { fill: #fff7cf; }
      .split { stroke: #ffd84a; stroke-width: 6; opacity: 0.9; }
    </style>
  </defs>

  <rect class="badge" x="20" y="20" width="216" height="216" rx="26" />
  <rect class="rim" x="34" y="34" width="188" height="188" rx="18" />

  <g filter="url(#glow)">
    <rect class="dark" x="48" y="56" width="30" height="24" />
    <rect class="orange" x="82" y="44" width="24" height="24" />
    <rect class="gold" x="108" y="66" width="18" height="18" />
    <rect class="noise" x="48" y="86" width="20" height="20" />
    <rect class="gold" x="70" y="92" width="26" height="22" />
    <rect class="dark" x="100" y="90" width="32" height="18" />
    <rect class="orange" x="56" y="120" width="24" height="26" />
    <rect class="gold" x="86" y="118" width="20" height="20" />
    <rect class="noise" x="112" y="112" width="14" height="30" />
    <rect class="dark" x="42" y="154" width="34" height="20" />
    <rect class="gold" x="78" y="150" width="22" height="28" />
    <rect class="orange" x="104" y="162" width="18" height="18" />
    <rect class="noise" x="60" y="182" width="20" height="18" />
    <rect class="gold" x="88" y="188" width="28" height="16" />

    <line class="split" x1="136" y1="48" x2="136" y2="208" />

    <rect class="gold" x="154" y="58" width="26" height="26" />
    <rect class="gold" x="184" y="58" width="26" height="26" />
    <rect class="gold" x="154" y="88" width="26" height="26" />
    <rect class="core" x="184" y="88" width="26" height="26" />
    <rect class="gold" x="154" y="118" width="26" height="26" />
    <rect class="gold" x="184" y="118" width="26" height="26" />
    <rect class="orange" x="154" y="148" width="26" height="26" />
    <rect class="gold" x="184" y="148" width="26" height="26" />
    <rect class="gold" x="154" y="178" width="26" height="26" />
    <rect class="gold" x="184" y="178" width="26" height="26" />
  </g>
</svg>
